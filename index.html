<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ТНТ — прототип</title>
<link rel="stylesheet" href="style.css?v=51">
</head>
<body>
<main class="phone">
<section id="search" class="screen active">
  <div class="top"><div class="hamb">☰</div><input id="q" placeholder="Поиск по проектам"></div>
  <h1>Проекты</h1><p class="muted">Введите название или выберите проект</p>
  <div id="results"></div>
</section>

<section id="project" class="screen">
  <div class="top"><button onclick="show('search')" class="back">‹</button><input id="q2" placeholder="Поиск по проектам"></div>
  <div class="hero"><div id="poster" class="poster"></div><div><h1 id="title"></h1><span id="status" class="badge"></span><span id="genre" class="muted"></span></div></div>
  <div class="card"><h2>Информация</h2><div id="info"></div></div>
  <div class="section"><h2>Каст</h2><button id="castToggle" onclick="toggleCast()">Показать всех</button></div>
  <div class="card"><table id="cast"></table></div>
  <h2>Сезоны</h2><div id="seasons" class="card"></div>
  <div class="actions"><button class="secondary" onclick="analytics()">⚖ Сравнить сезоны</button></div>
</section>

<section id="analytics" class="screen">
  <div class="head"><button onclick="show('project')" class="back">‹</button><h1>Сравнение</h1><button onclick="show('project')" class="back">⌯</button></div>

  <div class="card" id="compareCard">
    <h2>Сравнение сезонов по средней доле (%)</h2>
    <div id="compare" class="compare"></div>
  </div>

  <div class="card" id="timelineCard">
    <div class="timelineTitleRow">
      <h2>Динамика доли сезонов</h2>
      <select id="timelineModeSelect" onchange="renderSeasonTimeline()"><option value="dates">По датам</option><option value="weekday">По дням недели</option></select>
    </div>
    <select id="timelineSeasonSelect" onchange="renderSeasonTimeline()">
      <option value="1">Сезон 1</option>
      <option value="2">Сезон 2</option>
      <option value="3">Сезон 3</option>
      <option value="4">Сезон 4</option>
      <option value="5">Сезон 5</option>
    </select>
    <div id="seasonTimelineChart"></div>
  </div>

  <div class="card" id="heatCard">
    <h2>Тепловая карта по выпускам</h2>
    <table id="heat"></table>
  </div>

  <footer><span onclick="show('search')">⌕<br>Поиск</span><span onclick="show('project')">▣<br>Проекты</span><span class="on" onclick="analytics()">⚖<br>Сравнение</span></footer>
</section>

<section id="environment" class="screen">
  <div class="head"><button onclick="show('analytics')" class="back">‹</button><h1>EPG окружение</h1><button onclick="show('analytics')" class="back">⌯</button></div>
  <div class="epgCard epgCardFull"><div id="environmentChart"></div></div>
  <footer><span onclick="show('project')">▣<br>Проект</span><span class="on" onclick="show('analytics')">⚖<br>Сравнение</span><span onclick="show('search')">⌕<br>Поиск</span></footer>
</section>

</main>
<script src="script.js?v=51"></script>
</body></html>
